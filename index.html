  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.25);
      --radius: 9999px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; -webkit-font-smoothing: antialiased; }

    .liquid-glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,rgba(255,255,255,0.45) 0%,rgba(255,255,255,0.15) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,0.15) 80%,rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .liquid-glass-strong {
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,rgba(255,255,255,0.5) 0%,rgba(255,255,255,0.2) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,0.2) 80%,rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    video { display: block; }
  </style>
</head>

  <script type="text/babel">
    const { useRef, useEffect, useState } = React;

    // ── Icons ──────────────────────────────────────────────────────────────
    function IconArrowUpRight({ size = 16, className = "" }) {
      return (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="7" y1="17" x2="17" y2="7" /><polyline points="7 7 17 7 17 17" /></svg>);
    }
    function IconZap({ size = 20, className = "" }) {
      return (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></svg>);
    }
    function IconPalette({ size = 20, className = "" }) {
      return (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="13.5" cy="6.5" r=".5" fill="currentColor" /><circle cx="17.5" cy="10.5" r=".5" fill="currentColor" /><circle cx="8.5" cy="7.5" r=".5" fill="currentColor" /><circle cx="6.5" cy="12.5" r=".5" fill="currentColor" /><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z" /></svg>);
    }
    function IconBarChart3({ size = 20, className = "" }) {
      return (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18" /><path d="M18 17V9" /><path d="M13 17V5" /><path d="M8 17v-3" /></svg>);
    }
    function IconShield({ size = 20, className = "" }) {
      return (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>);
    }

    // ── BlurText ───────────────────────────────────────────────────────────
    function BlurText({ text, className = "", delay = 120, tag = "span", rootMargin = "0px 0px -120px 0px" }) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const observer = new IntersectionObserver(([entry]) => { if (entry.isIntersecting) setVisible(true); }, { threshold: 0.1, rootMargin });
        observer.observe(el);
        return () => observer.disconnect();
      }, []);
      const words = text.split(" ");
      const Tag = tag;
      return (
        <Tag ref={ref} className={className} style={{ display: "block" }}>
          {words.map((word, i) => (
            <span key={i} style={{ display: "inline-block", opacity: visible ? 1 : 0, filter: visible ? "blur(0px)" : "blur(12px)", transform: visible ? "translateY(0px)" : "translateY(30px)", transition: `opacity 0.55s ease ${i * delay}ms, filter 0.55s ease ${i * delay}ms, transform 0.55s ease ${i * delay}ms`, marginRight: "0.28em" }}>{word}</span>
          ))}
        </Tag>
      );
    }

    // ── FadeIn ─────────────────────────────────────────────────────────────
    function FadeIn({ children, delay = 0, className = "", threshold = 0.1, rootMargin = "0px 0px -80px 0px" }) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const observer = new IntersectionObserver(([entry]) => { if (entry.isIntersecting) setVisible(true); }, { threshold, rootMargin });
        observer.observe(el);
        return () => observer.disconnect();
      }, []);
      return (
        <div ref={ref} className={className} style={{ opacity: visible ? 1 : 0, filter: visible ? "blur(0px)" : "blur(8px)", transform: visible ? "translateY(0px)" : "translateY(24px)", transition: `opacity 0.6s ease ${delay}ms, filter 0.6s ease ${delay}ms, transform 0.6s ease ${delay}ms` }}>
          {children}
        </div>
      );
    }

    // ── HLSVideo ───────────────────────────────────────────────────────────
    function HLSVideo({ src, className = "", desaturate = false, style = {}, poster }) {
      const videoRef = useRef(null);
      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;
        if (window.Hls && window.Hls.isSupported()) {
          const hls = new window.Hls({ autoStartLoad: true, lowLatencyMode: false });
          hls.loadSource(src);
          hls.attachMedia(video);
          hls.on(window.Hls.Events.MANIFEST_PARSED, () => { video.play().catch(() => {}); });
          return () => hls.destroy();
        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = src;
          video.play().catch(() => {});
        }
      }, [src]);
      return (<video ref={videoRef} autoPlay loop muted playsInline poster={poster} className={className} style={{ ...(desaturate ? { filter: "saturate(0)" } : {}), ...style }} />);
    }

    // ── SectionBadge ──────────────────────────────────────────────────────
    function SectionBadge({ children }) {
      return (<span className="liquid-glass rounded-full px-3.5 py-1 text-xs font-bold text-white font-hero inline-block tracking-wide uppercase">{children}</span>);
    }

    // ── Navbar ─────────────────────────────────────────────────────────────
    function Navbar() {
      const [active, setActive] = useState("Home");
      useEffect(() => {
        const sections = [["Home", null],["Workflow","capabilities"],["Portfolio","our-work"],["FAQ","faq"],["Contacts","contact"]];
        const onScroll = () => {
          const scrollY = window.scrollY + 120;
          const atBottom = window.innerHeight + window.scrollY >= document.body.scrollHeight - 100;
          if (atBottom) { setActive("Contacts"); return; }
          let current = "Home";
          for (const [label, id] of sections) {
            if (!id) continue;
            const el = document.getElementById(id);
            if (el && el.offsetTop <= scrollY) current = label;
          }
          setActive(current);
        };
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
      }, []);
      return (
        <nav className="fixed top-4 left-0 right-0 z-50 px-8 lg:px-16 flex items-center justify-between py-3" style={{ transition: "all 0.3s ease" }}>
          <a href="#" onClick={(e) => { e.preventDefault(); window.scrollTo({ top: 0, behavior: "smooth" }); }} className="flex items-center gap-2 cursor-pointer">
            <div className="liquid-glass rounded-full w-10 h-10 flex items-center justify-center overflow-hidden">
              <img src="uploads/Asset 2@3x-8.png" alt="Lato Studio" style={{ width: "70%", height: "70%", objectFit: "contain" }} />
            </div>
            <span className="font-hero font-bold text-white text-lg hidden sm:block">Lato Studio</span>
          </a>
          <div className="hidden md:flex liquid-glass rounded-full px-1.5 py-1 items-center gap-1">
            {[["Home","#"],["Workflow","#capabilities"],["Portfolio","#our-work"],["FAQ","#faq"],["Contacts","#contact"]].map(([label, href]) => (
              <a key={label} href={href} className="px-3 py-2 text-sm font-medium font-body transition-all rounded-full" style={{ color: active === label ? "#000" : "rgba(255,255,255,0.75)", background: active === label ? "#fff" : "transparent" }}>{label}</a>
            ))}
          </div>
          <a href="#contact" className="md:hidden flex items-center gap-1 bg-white text-black rounded-full px-3.5 py-1.5 text-sm font-medium font-body">Contacts</a>
        </nav>
      );
    }

      { name: "Hyde",            subs: "865K subscribers",  img: "https://yt3.googleusercontent.com/MLvaKadLY7DCVqOg_J_TgzESuYCWudKCfMkD0Up_kLqIQ-bUDbiP95rcNVCY8CLoxdWE-c8ItQ=s160-c-k-c0x00ffffff-no-rj" },
      { name: "AstroViktor",     subs: "114K subscribers",  img: "https://yt3.googleusercontent.com/BbmIGgqUlKg5zGloH-iVH7Zyy6kba5Tm4xfc-_k84FSOldbKCtYCQdN69BRK84XeT3-AL3D9DQ=s160-c-k-c0x00ffffff-no-rj" },
      { name: "Ascensore",       subs: "12,8K subscribers", img: "https://yt3.googleusercontent.com/AVqp_OHPe6oOXXR8Co-CCigOvosPxhV5VKLvSe8XBz4lyreFWPncOgvn60THkn7ci1VICkuR=s160-c-k-c0x00ffffff-no-rj" },

      { name: "QueenGiorgia",    subs: "176K subscribers",  img: "https://yt3.googleusercontent.com/JJSuYX1QDOOqGzre4KDkbNhb1na19gpfxUufGzMUWNWoJUVGDf75AHKAeoPywIpTSei_QMYEuQ=s160-c-k-c0x00ffffff-no-rj" },

      { name: "Portable Orange", subs: "51K subscribers",   img: "https://yt3.googleusercontent.com/paVLW5j7sOimYOidgAU4iFRtBmrf7VLiytPxwPegF1iRHMYh-psPtDAEzxV2IIxNTWxQZQU94uM=s160-c-k-c0x00ffffff-no-rj" },
      { name: "Chase Bridges",   subs: "178K subscribers",  img: "https://yt3.googleusercontent.com/HkbpApb2LE5966UnxKqyzDkd7IOIzOys6Jyo3U8S4WGyWyXS3vmwgJ7QTAMtRjks4rA8ukpzOA=s160-c-k-c0x00ffffff-no-rj" },
      { name: "E. with Giotto",  subs: "228K subscribers",  img: "https://yt3.googleusercontent.com/bOrWjta1mBS1Sw_-UpzCzeb8tXSb9N5h_tAIfpWiSD-egZp78qlIwzm-k_Ydiy8H1aVSUVaP=s160-c-k-c0x00ffffff-no-rj" },
      { name: "ZaneSG",          subs: "383K subscribers",  img: "https://yt3.googleusercontent.com/ytc/AIdro_kTlI52D-Aa4PW4SxbNv4w9zpSnu4vuZIN7wI3U-VOv2S0=s160-c-k-c0x00ffffff-no-rj" },
      { name: "The Booyz",       subs: "215K subscribers",  img: "https://yt3.googleusercontent.com/M8_ce2aTmSNxA1v65ETAJRcl9QPZfQiGsLnCivvOg1qxcIPziuYu8EKpxisx9LKWoFdQVVEFeQ=s160-c-k-c0x00ffffff-no-rj" },
      { name: "Powah",           subs: "400K subscribers",  img: "https://yt3.googleusercontent.com/idmRdaeWx5v_nW2ZyccLU5po21JEa-A_Hxp-nscH7qTkdjZ9rszjVlA8fWaRUP7r5DA814jj=s900-c-k-c0x00ffffff-no-rj" },
    ];
    function CreatorsCarousel() {
      const items = [...creators, ...creators, ...creators];
      const trackRef = useRef(null);
      const wrapRef = useRef(null);
      const currentX = useRef(0);
      const targetX = useRef(0);
      const rafRef = useRef(null);
      const isMobile = window.innerWidth < 768;

      const scroll = (dir) => { targetX.current += dir * 260; };

      useEffect(() => {
        let touchStartX = 0, touchStartY = 0, isSwiping = false;
        const onTouchStart = (e) => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; isSwiping = false; };
        const onTouchMove = (e) => {
          if (!trackRef.current) return;
          const dx = touchStartX - e.touches[0].clientX;
          const dy = Math.abs(touchStartY - e.touches[0].clientY);
          if (!isSwiping && dy > Math.abs(dx) * 1.5) return;
          isSwiping = true;
          e.preventDefault();
          targetX.current += dx * 1.5;
          touchStartX = e.touches[0].clientX;
        };

        const animate = () => {
          currentX.current += (targetX.current - currentX.current) * 0.06;
          if (trackRef.current) {
            const trackW = trackRef.current.scrollWidth / 3;
            if (currentX.current >= trackW) { currentX.current -= trackW; targetX.current -= trackW; }
            else if (currentX.current < 0) { currentX.current += trackW; targetX.current += trackW; }
            trackRef.current.style.transform = `translateX(-${currentX.current}px)`;
          }
          rafRef.current = requestAnimationFrame(animate);
        };

        const el = wrapRef.current;
        el.addEventListener("touchstart", onTouchStart, { passive: true });
        el.addEventListener("touchmove", onTouchMove, { passive: false });
        rafRef.current = requestAnimationFrame(animate);
        return () => {
          el.removeEventListener("touchstart", onTouchStart);
          el.removeEventListener("touchmove", onTouchMove);
          cancelAnimationFrame(rafRef.current);
        };
      }, []);

      const ArrowBtn = ({ dir }) => (
        <button onClick={() => scroll(dir)}
          className="hidden md:flex liquid-glass-strong rounded-full items-center justify-center flex-shrink-0 hover:bg-white/20 transition-all"
          style={{ width: "44px", height: "44px", minWidth: "44px" }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">

      };

      const ArrowBtn = ({ dir, disabled }) => (
        <button onClick={() => scrollBy(dir)} disabled={disabled}
          className="hidden md:flex liquid-glass-strong rounded-full items-center justify-center flex-shrink-0 transition-all"
          style={{ width: "44px", height: "44px", minWidth: "44px", opacity: disabled ? 0.3 : 1, cursor: disabled ? "default" : "pointer" }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            {dir === -1 ? <polyline points="15 18 9 12 15 6"/> : <polyline points="9 6 15 12 9 18"/>}
          </svg>
        </button>
      );

      return (
        <section className="relative z-10 py-24 px-6 md:px-12 lg:px-24 bg-black">
          <div className="max-w-6xl mx-auto">
            <FadeIn className="text-center mb-16">
              <SectionBadge>What They Say</SectionBadge>
              <BlurText text="Don't take our word for it." className="text-4xl md:text-5xl lg:text-6xl font-hero font-bold text-white tracking-tight leading-[0.9] mt-4" delay={80} />
            </FadeIn>
            <div className="flex items-center gap-3 md:gap-4">
              <ArrowBtn dir={-1} disabled={!canLeft} />
              <div ref={scrollerRef} className="flex-1 flex gap-6 overflow-x-auto" style={{ scrollSnapType: "x mandatory", scrollbarWidth: "none", msOverflowStyle: "none" }}>
                <style>{`section .flex-1.overflow-x-auto::-webkit-scrollbar { display: none; }`}</style>
                {testimonials.map((t, i) => (
                  <div key={i} className="liquid-glass rounded-2xl p-6 md:p-8 flex flex-col gap-5 flex-shrink-0" style={{ width: window.innerWidth < 768 ? "78%" : "calc(33.333% - 1rem)", minWidth: "240px", scrollSnapAlign: "start" }}>
                    <div className="flex items-center gap-3">
                      <img src={t.img} alt={t.name} className="w-12 h-12 rounded-full object-cover" style={{ border: "1.5px solid rgba(255,255,255,0.2)" }} />
                      <div className="flex-1">
                        <p className="text-white font-body font-medium text-sm">{t.name}</p>
                        <p className="text-white/50 font-body font-light text-xs mt-0.5">{t.role}</p>
                      </div>
                    </div>
                    <p className="text-white/80 font-body font-light text-sm leading-relaxed flex-1">{t.quote}</p>
                  </div>
                ))}
              </div>
              <ArrowBtn dir={1} disabled={!canRight} />
            </div>
          </div>
        </section>
      );
    }

    // ── ContactForm ───────────────────────────────────────────────────────
    function ContactForm() {
      const [form, setForm] = useState({ name: "", email: "", message: "" });
      const [sent, setSent] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const [error, setError] = useState("");
      const handle = (e) => setForm({ ...form, [e.target.name]: e.target.value });
      const submit = async (e) => {
        e.preventDefault();
        setSubmitting(true);
        setError("");
        try {
          const res = await fetch("https://formspree.io/f/mkoernla", {
            method: "POST",
            headers: { "Accept": "application/json", "Content-Type": "application/json" },
            body: JSON.stringify(form),
          });
          if (res.ok) {
            setSent(true);
          } else {
            const data = await res.json().catch(() => ({}));
            setError(data.error || "Something went wrong. Please try again.");
          }
        } catch (err) {
          setError("Network error. Please try again.");
        } finally {
          setSubmitting(false);
        }
      };
      const inputStyle = { background: "rgba(255,255,255,0.07)", border: "1.4px solid rgba(255,255,255,0.15)", borderRadius: "14px", color: "white", padding: "14px 18px", width: "100%", outline: "none", fontFamily: "'Barlow', sans-serif", fontSize: "14px", transition: "border-color 0.2s" };
      return (
        <section id="contact" className="relative z-10 py-28 px-6 md:px-12 lg:px-24 bg-black">
          <div className="max-w-2xl mx-auto">
            <FadeIn className="text-center mb-12">
              <SectionBadge>Contact</SectionBadge>
              <h2 className="text-5xl md:text-6xl font-hero font-bold text-white mt-4 tracking-tight">Let's talk.</h2>
            </FadeIn>
            {sent ? (
              <FadeIn><div className="liquid-glass rounded-2xl p-12 text-center"><p className="text-white font-hero font-bold text-2xl mb-2">Message sent!</p><p className="text-white/60 font-body font-light text-sm">We'll get back to you shortly.</p></div></FadeIn>
            ) : (
              <FadeIn delay={100}>
                <form onSubmit={submit} className="liquid-glass rounded-2xl p-8 flex flex-col gap-4">
                  <input name="name" type="text" placeholder="Your Name" value={form.name} onChange={handle} required style={inputStyle} onFocus={e => e.target.style.borderColor="rgba(255,255,255,0.4)"} onBlur={e => e.target.style.borderColor="rgba(255,255,255,0.15)"} />
                  <input name="email" type="email" placeholder="Email" value={form.email} onChange={handle} required style={inputStyle} onFocus={e => e.target.style.borderColor="rgba(255,255,255,0.4)"} onBlur={e => e.target.style.borderColor="rgba(255,255,255,0.15)"} />
                  <textarea name="message" placeholder="Write your message" value={form.message} onChange={handle} required rows={5} style={{ ...inputStyle, resize: "none" }} onFocus={e => e.target.style.borderColor="rgba(255,255,255,0.4)"} onBlur={e => e.target.style.borderColor="rgba(255,255,255,0.15)"} />
                  {error && <p className="text-red-400 text-xs font-body">{error}</p>}
                  <button type="submit" disabled={submitting} className="w-full bg-white text-black font-hero font-bold text-sm rounded-2xl py-4 hover:bg-white/90 transition-colors mt-1 disabled:opacity-60 disabled:cursor-not-allowed">{submitting ? "Sending..." : "Submit"}</button>
                </form>
              </FadeIn>
            )}
          </div>
        </section>
      );
    }

    // ── CtaFooter ─────────────────────────────────────────────────────────
    function CtaFooter() {
      return (
        <section className="relative overflow-hidden w-full" style={{ minHeight: "300px" }}>
          <HLSVideo src="https://stream.mux.com/8wrHPCX2dC3msyYU9ObwqNdm00u3ViXvOSHUMRYSEe5Q.m3u8" className="absolute inset-0 w-full h-full object-cover z-0" />
          <div className="absolute inset-0 z-0 pointer-events-none" style={{ background: "linear-gradient(to bottom, black 0%, transparent 200px)" }} />
          <div className="absolute inset-0 bg-black/40 z-0 pointer-events-none" />
          <div className="relative z-10 flex flex-col items-center justify-end h-full py-10 px-8 md:px-16" style={{ minHeight: "300px" }}>
            <div className="w-full flex flex-col sm:flex-row items-center justify-between gap-4 border-t border-white/20 pt-8">
              <span className="text-white/70 text-sm font-body">© 2026 Lato Studio. All rights reserved.</span>
              <div className="flex items-center gap-8">
                {[["Privacy", "https://docs.google.com/document/d/e/2PACX-1vSi_s3iCmYRj27zoOjjz-pwakmUHzNVC82wTH9osaQNTcVG53--ljcPiQJFYIg8981EOiGxpU-4_RB6/pub"], ["Terms", "https://docs.google.com/document/d/e/2PACX-1vSCsHB4HkLZiIc9fi6ikjF-A5e5OdyjX2juNhEh77FtgkgTwI_rouEGeaAy_yooa_fdsQQRelustDks/pub"]].map(([link, href]) => (
                  <a key={link} href={href} target="_blank" rel="noopener noreferrer" className="text-white/60 text-sm font-body hover:text-white transition-colors">{link}</a>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────
    function App() {
      return (
        <div className="bg-black min-h-screen">
          <div className="relative z-10">
            <Navbar />
            <Hero />
            <div className="bg-black">
              <FeaturesChess />
              <OurWork />
              <FAQ />
              <FeaturesGrid />
              <Stats />
              <Testimonials />
              <ContactForm />
              <CtaFooter />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
