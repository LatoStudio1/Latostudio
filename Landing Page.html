<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lato Studio — YouTube Thumbnail Design</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ["'Instrument Serif'", "serif"],
            hero: ["'Space Grotesk'", "sans-serif"],
            body: ["'Barlow'", "sans-serif"],
          }
        }
      }
    };
  </script>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- hls.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.15/dist/hls.min.js"></script>

  <style>
    /* ── CSS Custom Properties ─────────────────────────────────────────── */
    :root {
      --background: 213 45% 67%;
      --foreground: 0 0% 100%;
      --card: 213 45% 62%;
      --card-foreground: 0 0% 100%;
      --primary: 0 0% 100%;
      --primary-foreground: 213 45% 67%;
      --secondary: 213 45% 72%;
      --secondary-foreground: 0 0% 100%;
      --muted: 213 35% 60%;
      --muted-foreground: 0 0% 100% / 0.7;
      --accent: 213 45% 72%;
      --accent-foreground: 0 0% 100%;
      --destructive: 0 84.2% 60.2%;
      --border: 0 0% 100% / 0.2;
      --input: 0 0% 100% / 0.2;
      --ring: 0 0% 100% / 0.3;
      --radius: 9999px;
      --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.25);
      --glass-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
      --glass-blur: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #000; color: #fff; -webkit-font-smoothing: antialiased; }

    /* ── Liquid Glass ──────────────────────────────────────────────────── */
    .liquid-glass {
      background: rgba(255, 255, 255, 0.08);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0)    40%,
        rgba(255,255,255,0)    60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .liquid-glass-strong {
      background: rgba(255, 255, 255, 0.10);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0)   40%,
        rgba(255,255,255,0)   60%,
        rgba(255,255,255,0.2) 80%,
        rgba(255,255,255,0.5) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ── Scrollbar ─────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* ── Video object-fit fill helper ──────────────────────────────────── */
    video { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Components -->
  <script type="text/babel" src="components.jsx"></script>

  <!-- Sections -->
  <script type="text/babel" src="sections.jsx"></script>

  <!-- App -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
