function IconPlay({ size = 16, className = "" }) {

}
function IconZap({ size = 20, className = "" }) {

}
function IconPalette({ size = 20, className = "" }) {

}
function IconBarChart3({ size = 20, className = "" }) {
  return (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18" /><path d="M18 17V9" /><path d="M13 17V5" /><path d="M8 17v-3" /></svg>);
}
function IconShield({ size = 20, className = "" }) {
  return (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>);
}

function BlurText({ text, className = "", delay = 120, tag = "span" }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const observer = new IntersectionObserver(([entry]) => { if (entry.isIntersecting) setVisible(true); }, { threshold: 0.1 });
    observer.observe(el);
    return () => observer.disconnect();
  }, []);
  const words = text.split(" ");
  const Tag = tag;
  return (
    <Tag ref={ref} className={className} style={{ display: "block" }}>
      {words.map((word, i) => (
        <span key={i} style={{ display: "inline-block", opacity: visible ? 1 : 0, filter: visible ? "blur(0px)" : "blur(12px)", transform: visible ? "translateY(0px)" : "translateY(30px)", transition: `opacity 0.55s ease ${i * delay}ms, filter 0.55s ease ${i * delay}ms, transform 0.55s ease ${i * delay}ms`, marginRight: "0.28em" }}>{word}</span>
      ))}
    </Tag>
  );
}

function FadeIn({ children, delay = 0, className = "", threshold = 0.1 }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const observer = new IntersectionObserver(([entry]) => { if (entry.isIntersecting) setVisible(true); }, { threshold });
    observer.observe(el);
    return () => observer.disconnect();
  }, []);
  return (
    <div ref={ref} className={className} style={{ opacity: visible ? 1 : 0, filter: visible ? "blur(0px)" : "blur(8px)", transform: visible ? "translateY(0px)" : "translateY(24px)", transition: `opacity 0.6s ease ${delay}ms, filter 0.6s ease ${delay}ms, transform 0.6s ease ${delay}ms` }}>
      {children}
    </div>
  );
}

function HLSVideo({ src, className = "", desaturate = false, style = {}, poster }) {
  const videoRef = useRef(null);
  useEffect(() => {
    const video = videoRef.current;
    if (!video) return;
    if (window.Hls && window.Hls.isSupported()) {
      const hls = new window.Hls({ autoStartLoad: true, lowLatencyMode: false });
      hls.loadSource(src);
      hls.attachMedia(video);
      hls.on(window.Hls.Events.MANIFEST_PARSED, () => { video.play().catch(() => {}); });
      return () => hls.destroy();
    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = src;
      video.play().catch(() => {});
    }
  }, [src]);
  return <video ref={videoRef} autoPlay loop muted playsInline poster={poster} className={className} style={{ ...(desaturate ? { filter: "saturate(0)" } : {}), ...style }} />;
}

function SectionBadge({ children }) {
  return <span className="liquid-glass rounded-full px-3.5 py-1 text-xs font-medium text-white font-body inline-block">{children}</span>;
}

Object.assign(window, { IconArrowUpRight, IconPlay, IconZap, IconPalette, IconBarChart3, IconShield, BlurText, FadeIn, HLSVideo, SectionBadge });

  <script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"accentGlow": true, "glassStrength": "medium", "heroParallax": true}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);
  const updateTweak = (key, value) => {
    const next = { ...tweaks, [key]: value };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: value } }, "*");
  };
  return (
    <div className="bg-black min-h-screen">
      <div className="relative z-10">
        <Navbar />
        <Hero />
        <div className="bg-black">
          <StartSection />
          <FeaturesChess />
          <FeaturesGrid />
          <Stats />
          <Testimonials />
          <CtaFooter />
        </div>
      </div>
      {tweaksOpen && (
        <div className="fixed bottom-6 right-6 z-[999] liquid-glass-strong rounded-2xl p-5 w-64 text-white font-body">
          <h3 className="font-medium text-sm mb-4 text-white/90">Tweaks</h3>
          <div className="flex flex-col gap-4">
            <label className="flex items-center justify-between text-xs text-white/70">
              Accent glow
              <button onClick={() => updateTweak("accentGlow", !tweaks.accentGlow)} className={`w-9 h-5 rounded-full transition-colors relative ${tweaks.accentGlow ? "bg-white/30" : "bg-white/10"}`}>
                <span className={`absolute top-0.5 w-4 h-4 bg-white rounded-full transition-transform ${tweaks.accentGlow ? "translate-x-4" : "translate-x-0.5"}`} />
              </button>
            </label>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
